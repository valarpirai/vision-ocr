version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vision_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vision_password}
      POSTGRES_DB: ${POSTGRES_DB:-vision_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vision_user}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vision_user}:${POSTGRES_PASSWORD:-vision_password}@postgres:5432/${POSTGRES_DB:-vision_db}
      UPLOAD_DIR: /app/uploads
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-5}
      WORKER_TIMEOUT: ${WORKER_TIMEOUT:-300}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-52428800}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python worker.py
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vision_user}:${POSTGRES_PASSWORD:-vision_password}@postgres:5432/${POSTGRES_DB:-vision_db}
      UPLOAD_DIR: /app/uploads
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-5}
      WORKER_TIMEOUT: ${WORKER_TIMEOUT:-300}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      replicas: 3

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
